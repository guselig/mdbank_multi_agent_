services:

  supervisor:
    build: ./supervisor
    container_name: mdbank_supervisor_agents
    ports:
      - "8000:8000"
    volumes:
      - ./supervisor:/app
    env_file:
      - ./supervisor/.env
    networks:
      - mdbank_network
    depends_on:
      - abrir_conta_agent
      - cartao_credito_agent

  frontend:
    build: ./frontend
    container_name: mdbank_frontend
    ports:
      - "9090:9090"
    volumes:
      - ./frontend:/app
    networks:
      - mdbank_network
    depends_on:
      - supervisor

  abrir_conta_agent:
    container_name: abrir_conta_agent
    build:
      context: ./agents/abrir_conta
    volumes:
      - ./agents/abrir_conta:/app
    ports:
      - "8081:8000"
    env_file:
      - ./agents/abrir_conta/.env
    networks:
      - mdbank_network

  cartao_credito_agent:
    container_name: cartao_credito_agent
    build:
      context: ./agents/cartao_credito
    volumes:
      - ./agents/cartao_credito:/app
    ports:
      - "8082:8000"
    env_file:
      - ./agents/cartao_credito/.env
    networks:
      - mdbank_network

networks:
  mdbank_network:
    driver: bridge